name: nodescope

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  nodescope-bitcoind:
    image: bitcoin/bitcoin:31
    container_name: nodescope-bitcoind
    restart: unless-stopped
    command:
      - -regtest=1
      - -server=1
      - -rpcuser=${BITCOIN_RPC_USER:-nodescope}
      - -rpcpassword=${BITCOIN_RPC_PASSWORD:-nodescope}
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -zmqpubrawblock=tcp://0.0.0.0:28332
      - -zmqpubrawtx=tcp://0.0.0.0:28333
      - -txindex=1
      - -fallbackfee=0.0001
    ports:
      - "${HOST_BITCOIN_RPC_PORT:-18443}:18443"
      - "${HOST_ZMQ_RAWBLOCK_PORT:-28332}:28332"
      - "${HOST_ZMQ_RAWTX_PORT:-28333}:28333"
    volumes:
      - nodescope-bitcoin-data:/home/bitcoin/.bitcoin
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -regtest -rpcuser=$${BITCOIN_RPC_USER:-nodescope} -rpcpassword=$${BITCOIN_RPC_PASSWORD:-nodescope} getblockchaininfo >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    logging:
      <<: *default-logging

  nodescope-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: nodescope-api:latest
    container_name: nodescope-api
    restart: unless-stopped
    depends_on:
      nodescope-bitcoind:
        condition: service_healthy
    ports:
      - "${HOST_API_PORT:-8000}:8000"
    volumes:
      - ./logs:/app/logs
    environment:
      BITCOIN_RPC_URL: http://nodescope-bitcoind:18443
      BITCOIN_RPC_USER: ${BITCOIN_RPC_USER:-nodescope}
      BITCOIN_RPC_PASSWORD: ${BITCOIN_RPC_PASSWORD:-nodescope}
      NODESCOPE_LOG_DIR: /app/logs
      API_HOST: 0.0.0.0
      API_PORT: 8000
      SIMULATION_ENABLED: "true"
      SIMULATION_BLOCK_INTERVAL: "30"
      SIMULATION_TX_INTERVAL: "12"
    command: ["python", "scripts/run_api.py"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      <<: *default-logging

  nodescope-monitor:
    image: nodescope-api:latest
    container_name: nodescope-monitor
    restart: unless-stopped
    depends_on:
      nodescope-bitcoind:
        condition: service_healthy
      nodescope-api:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    environment:
      BITCOIN_RPC_URL: http://nodescope-bitcoind:18443
      BITCOIN_RPC_USER: ${BITCOIN_RPC_USER:-nodescope}
      BITCOIN_RPC_PASSWORD: ${BITCOIN_RPC_PASSWORD:-nodescope}
      ZMQ_RAWBLOCK_URL: tcp://nodescope-bitcoind:28332
      ZMQ_RAWTX_URL: tcp://nodescope-bitcoind:28333
      NODESCOPE_LOG_DIR: /app/logs
    command: ["python", "monitor.py"]
    logging:
      <<: *default-logging

  nodescope-frontend:
    image: node:20-alpine
    container_name: nodescope-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      nodescope-api:
        condition: service_healthy
    ports:
      - "${HOST_FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - nodescope-frontend-build-node-modules:/app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://nodescope-api:8000
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    logging:
      <<: *default-logging

  nodescope-api-test:
    image: nodescope-api:latest
    profiles: ["tools"]
    depends_on:
      nodescope-bitcoind:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    environment:
      BITCOIN_RPC_URL: http://nodescope-bitcoind:18443
      BITCOIN_RPC_USER: ${BITCOIN_RPC_USER:-nodescope}
      BITCOIN_RPC_PASSWORD: ${BITCOIN_RPC_PASSWORD:-nodescope}
      ZMQ_RAWBLOCK_URL: tcp://nodescope-bitcoind:28332
      ZMQ_RAWTX_URL: tcp://nodescope-bitcoind:28333
      NODESCOPE_LOG_DIR: /app/logs
    command: ["python", "-m", "unittest", "discover", "-s", "tests", "-v"]

  nodescope-frontend-build:
    image: node:20-alpine
    profiles: ["tools"]
    working_dir: /app
    volumes:
      - ./frontend:/app
      - nodescope-frontend-node-modules:/app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://nodescope-api:8000
    command: ["sh", "-c", "npm ci && npm run build"]

volumes:
  nodescope-bitcoin-data:
  nodescope-frontend-node-modules:
  nodescope-frontend-build-node-modules:
